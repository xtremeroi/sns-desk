<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<style>
  :root {
    /* S&S dark navy (--bg #0a1020 / --panel #101a2e), translucent so the
       macOS vibrancy blur shows through like glass. */
    --bg: rgba(10, 16, 32, 0.68);
    --card: rgba(255, 255, 255, 0.06);
    --edge: rgba(255, 255, 255, 0.12);
    --text: #e8eaf0;
    --dim: #9aa1b0;
    --green: #34d399;
    --amber: #fbbf24;
    --red: #f87171;
    --accent: #60a5fa;
  }
  * { box-sizing: border-box; margin: 0; font-family: -apple-system, "SF Pro Text", sans-serif; }
  html, body { background: transparent; height: 100%; }
  body { color: var(--text); font-size: 13px; padding: 10px; }
  .shell { background: var(--bg); border: 1px solid var(--edge); border-radius: 14px; padding: 14px; display: flex; flex-direction: column; gap: 12px; height: 100%; }
  /* The header is the drag handle — manual drag via IPC, because CSS
     app-region hit-testing dies on transparent windows after hide/show. */
  .hdr { display: flex; align-items: center; gap: 8px; cursor: grab; user-select: none; }
  .hdr:active { cursor: grabbing; }
  .hdr .mark { flex: 0 0 auto; }
  .hdr .logo { font-weight: 700; letter-spacing: .3px; }
  .hdr .ver { color: var(--dim); font-size: 10px; font-family: ui-monospace, monospace; opacity: .8; }
  .hdr .who { color: var(--dim); font-size: 11px; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .iconbtn { background: none; border: none; color: var(--dim); cursor: pointer; font-size: 13px; padding: 2px 4px; border-radius: 6px; }
  .iconbtn:hover { color: var(--text); background: var(--card); }
  .iconbtn.on { color: var(--accent); }
  .syncmsg { font-size: 10px; color: var(--green); white-space: nowrap; }
  .syncmsg.warn { color: var(--amber); }
  @keyframes syncspin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
  .iconbtn.spin { animation: syncspin 0.8s linear infinite; }
  .banner { background: rgba(251, 191, 36, .12); border: 1px solid rgba(251, 191, 36, .35); color: var(--amber); border-radius: 10px; padding: 8px 10px; display: flex; align-items: center; gap: 8px; font-size: 12px; }
  .banner button { margin-left: auto; background: var(--amber); color: #1a1a1a; border: none; border-radius: 7px; padding: 4px 10px; font-weight: 600; cursor: pointer; }
  .pill { background: rgba(255, 255, 255, 0.07); border: 1px solid rgba(255, 255, 255, 0.16); border-radius: 12px; padding: 12px; display: flex; flex-direction: column; gap: 10px; backdrop-filter: blur(24px) saturate(140%); box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.08); }
  .ticker { font-family: "SF Mono", ui-monospace, monospace; font-size: 30px; font-weight: 600; text-align: center; letter-spacing: 1px; }
  .ticker.out { color: var(--dim); font-size: 16px; font-weight: 500; padding: 8px 0; }
  .ticker.break { color: var(--amber); }
  .ticker.in { color: var(--green); }
  .sub { text-align: center; color: var(--dim); font-size: 11px; min-height: 14px; }
  select, input[type=text] { width: 100%; background: rgba(0,0,0,.3); border: 1px solid var(--edge); color: var(--text); border-radius: 8px; padding: 7px 9px; font-size: 13px; outline: none; }
  select:focus, input:focus { border-color: var(--accent); }
  .row { display: flex; gap: 8px; }
  .btn { flex: 1; border: none; border-radius: 9px; padding: 9px 0; font-size: 13px; font-weight: 600; cursor: pointer; }
  .btn.primary { background: var(--green); color: #06281c; }
  .btn.warn { background: rgba(251, 191, 36, .18); color: var(--amber); border: 1px solid rgba(251, 191, 36, .4); }
  .btn.stop { background: rgba(248, 113, 113, .16); color: var(--red); border: 1px solid rgba(248, 113, 113, .4); }
  .btn:active { transform: scale(.98); }
  .pendbadge { text-align: center; color: var(--amber); font-size: 11px; }
  .sect { display: flex; flex-direction: column; gap: 6px; flex: 1; min-height: 0; }
  .clientsect { flex: 0 0 auto; }
  .clientsect .bar { background: rgba(52, 211, 153, .12); }
  .sect h3 { font-size: 11px; text-transform: uppercase; letter-spacing: .8px; color: var(--dim); font-weight: 600; display: flex; align-items: center; }
  .sect h3 .total { margin-left: auto; color: var(--text); font-family: ui-monospace, monospace; text-transform: none; letter-spacing: 0; }
  .apps { overflow-y: auto; display: flex; flex-direction: column; gap: 4px; }
  .app { display: flex; align-items: center; gap: 8px; padding: 4px 6px; border-radius: 8px; position: relative; }
  .app:hover { background: var(--card); }
  .app .bar { position: absolute; left: 0; top: 0; bottom: 0; background: rgba(96, 165, 250, .10); border-radius: 8px; z-index: 0; }
  .app .nm { flex: 1; z-index: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .app .dur { color: var(--dim); font-family: ui-monospace, monospace; font-size: 12px; z-index: 1; }
  .app .live { width: 6px; height: 6px; border-radius: 50%; background: var(--green); z-index: 1; }
  .app .mute { z-index: 1; visibility: hidden; }
  .app:hover .mute { visibility: visible; }
  .muted-note { color: var(--dim); font-size: 10px; }
  .ftr { display: flex; align-items: center; gap: 8px; }
  .link { background: none; border: none; color: var(--accent); font-size: 11px; cursor: pointer; padding: 0; }
  .ftrbtn { background: none; border: 1px solid transparent; color: var(--dim); cursor: pointer; width: 28px; height: 26px; display: flex; align-items: center; justify-content: center; border-radius: 7px; }
  .ftrbtn:hover { color: var(--text); background: var(--card); border-color: var(--edge); }
  .quitbtn:hover { color: var(--red); background: rgba(248, 113, 113, .10); border-color: rgba(248, 113, 113, .35); }
  .spacer { flex: 1; }
  /* Responsive tiers LAST so they beat the base rules above at equal
     specificity. !important covers visibility set via inline styles.
     Compact (drag the bottom edge): day lists + footer tuck away. */
  @media (max-height: 419px) {
    .sect, .ftr { display: none !important; }
  }
  /* Mini timer (double-click the header): just the ticker + session line. */
  @media (max-height: 219px) {
    .banner, .pill select, .pill input, .pill .row, .pendbadge { display: none !important; }
    .pill { border: none; background: none; padding: 4px 0 0; backdrop-filter: none; box-shadow: none; }
    .ticker.out { padding: 0; }
  }
</style>
</head>
<body>
<div class="shell">
  <div class="hdr">
    <svg class="mark" width="15" height="15" viewBox="0 0 90 89" aria-hidden="true">
      <rect x="0" y="0" width="90" height="13" rx="6.5" fill="#e9ebf2"/>
      <rect x="0" y="19" width="22" height="13" rx="6.5" fill="#8b5cf6"/>
      <rect x="34" y="19" width="22" height="13" rx="6.5" fill="#8b5cf6"/>
      <rect x="0" y="38" width="90" height="13" rx="6.5" fill="#e9ebf2"/>
      <rect x="34" y="57" width="22" height="13" rx="6.5" fill="#8b5cf6"/>
      <rect x="68" y="57" width="22" height="13" rx="6.5" fill="#8b5cf6"/>
      <rect x="0" y="76" width="90" height="13" rx="6.5" fill="#e9ebf2"/>
    </svg>
    <span class="logo">S&amp;S Desk</span>
    <span class="ver" id="ver" title="App version"></span>
    <span class="who" id="who"></span>
    <span class="syncmsg" id="syncmsg"></span>
    <button class="iconbtn" id="pin" title="Pin on top of other windows">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 17v5"/><path d="M9 10.76V7a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v3.76a2 2 0 0 0 .59 1.42l1.7 1.7a1 1 0 0 1 .3.71V16a1 1 0 0 1-1 1H7.4a1 1 0 0 1-1-1v-1.41a1 1 0 0 1 .3-.7l1.7-1.71A2 2 0 0 0 9 10.76z"/></svg>
    </button>
    <button class="iconbtn" id="refresh" title="Sync now">↻</button>
    <button class="iconbtn" id="close" title="Close this panel (tracking keeps running in the menu bar)">✕</button>
  </div>
  <div class="banner" id="banner" style="display:none">
    <span>Session expired — sign in to sync.</span>
    <button id="loginBtn">Sign in</button>
  </div>
  <div class="pill">
    <div class="ticker out" id="ticker">Clocked out</div>
    <div class="sub" id="sub"></div>
    <select id="client"></select>
    <input type="text" id="note" placeholder="What are you working on? (optional)" maxlength="80" />
    <div class="row" id="actions"></div>
    <div class="pendbadge" id="pend" style="display:none"></div>
  </div>
  <div class="sect clientsect" id="clientsect" style="display:none">
    <h3>Clocked today <span class="total" id="clienttotal"></span></h3>
    <div class="apps" id="clients"></div>
  </div>
  <div class="sect">
    <h3>Today on this Mac <span class="total" id="total"></span></h3>
    <div class="apps" id="apps"></div>
    <div class="muted-note" id="mutednote" style="display:none"></div>
  </div>
  <div class="ftr">
    <span class="muted-note">app names only · recorded only while clocked in</span>
    <span class="spacer"></span>
    <button class="ftrbtn" id="timepage" title="Open the S&S Time page" aria-label="Open the S&S Time page">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
    </button>
    <button class="ftrbtn quitbtn" id="quit" title="Quit S&S Desk — stops all tracking on this Mac" aria-label="Quit S&S Desk — stops all tracking on this Mac">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18.36 6.64a9 9 0 1 1-12.73 0"/><line x1="12" y1="2" x2="12" y2="12"/></svg>
    </button>
  </div>
</div>
<script src="popup.js"></script>
</body>
</html>
